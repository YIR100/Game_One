<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tic Tac Toe — Live</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <main class="shell">
      <header class="hero">
        <h1>Tic Tac Toe</h1>
        <p class="tagline">Play live with a friend — share a room code.</p>
      </header>

      <section id="panel-lobby" class="panel">
        <div class="lobby-field">
          <label class="lobby-field-label" for="lobby-timer">Turn timer (per move)</label>
          <select id="lobby-timer" class="lobby-select" aria-label="Turn timer for new rooms">
            <option value="0">Off</option>
            <option value="10000">10 seconds</option>
            <option value="15000" selected>15 seconds</option>
            <option value="30000">30 seconds</option>
          </select>
        </div>
        <div class="actions">
          <button type="button" id="btn-create" class="btn primary">Create room</button>
          <div class="join-row">
            <input
              id="input-code"
              type="text"
              maxlength="6"
              autocomplete="off"
              autocapitalize="characters"
              spellcheck="false"
              placeholder="ROOM"
              aria-label="Room code"
            />
            <button type="button" id="btn-join" class="btn">Join</button>
          </div>
          <button type="button" id="btn-spectate" class="btn ghost">Spectate (watch only)</button>
        </div>
        <p id="lobby-error" class="error" hidden></p>
        <p id="rejoin-hint" class="hint subtle" hidden></p>
      </section>

      <section id="panel-game" class="panel hidden">
        <div class="room-bar">
          <div class="room-info">
            <span class="label">Room</span>
            <span id="room-code-display" class="room-code"></span>
            <button type="button" id="btn-copy" class="btn ghost small">Copy link</button>
          </div>
          <p id="status-line" class="status"></p>
          <div id="host-timer-row" class="host-timer-row hidden">
            <label class="lobby-field-label" for="host-timer">Turn timer</label>
            <select id="host-timer" class="lobby-select" aria-label="Turn timer (host)">
              <option value="0">Off</option>
              <option value="10000">10 seconds</option>
              <option value="15000" selected>15 seconds</option>
              <option value="30000">30 seconds</option>
            </select>
          </div>
          <p id="timer-policy-hint" class="timer-policy-hint hidden"></p>
          <p id="timer-line" class="timer-line hidden" aria-live="polite"></p>
        </div>

        <div id="score-strip" class="score-strip" aria-label="Match scores">
          <div class="score-cell" id="score-cell-you">
            <span class="score-val" id="score-you">0</span>
            <span class="score-lbl" id="score-you-lbl">You (X)</span>
          </div>
          <div class="score-cell score-draws-cell">
            <span class="score-val" id="score-draws">0</span>
            <span class="score-lbl">Draws</span>
          </div>
          <div class="score-cell" id="score-cell-them">
            <span class="score-val" id="score-them">0</span>
            <span class="score-lbl" id="score-them-lbl">Them (O)</span>
          </div>
        </div>
        <div class="score-actions" id="score-actions-row">
          <button type="button" id="btn-reset-scores" class="btn ghost small">Reset scores</button>
        </div>

        <div id="board" class="board" role="grid" aria-label="Tic tac toe board"></div>

        <details id="history-panel" class="history-panel">
          <summary>Session history</summary>
          <ul id="history-list" class="history-list"></ul>
        </details>

        <div id="overlay-result" class="overlay hidden" role="status">
          <p id="result-text" class="result-text"></p>
          <p id="result-series" class="result-series" hidden></p>
          <button type="button" id="btn-again" class="btn primary">Play again</button>
          <button type="button" id="btn-leave" class="btn ghost">Leave room</button>
        </div>

        <p id="hint-wait" class="hint hidden">Waiting for opponent to join…</p>
      </section>
    </main>

    <aside id="chat-dock" class="chat-dock hidden" aria-label="Room chat">
      <button type="button" id="chat-toggle" class="chat-toggle" aria-expanded="false">
        Chat
        <span id="chat-badge" class="chat-badge hidden" aria-hidden="true"></span>
      </button>
      <div id="chat-panel" class="chat-panel hidden">
        <div id="chat-messages" class="chat-messages" role="log"></div>
        <form id="chat-form" class="chat-form">
          <input id="chat-input" type="text" maxlength="200" autocomplete="off" placeholder="Message…" aria-label="Chat message" />
          <button type="submit" class="btn small">Send</button>
        </form>
      </div>
    </aside>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
